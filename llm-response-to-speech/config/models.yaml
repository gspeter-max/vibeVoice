models:
  kokoro:
    name: "Kokoro 82M"
    socket: "/tmp/tts-kokoro.sock"
    pid_file: "/tmp/tts-kokoro.pid"
    log_file: "logs/kokoro.log"
    type: "cli"
    license: "MIT (Open Source)"
    requires_api_key: false
    executable: "kokoro-tts"
    voice: "am_michael"
    lang: "en-us"
    # Hardware requirements
    model_size_mb: 350
    min_ram_gb: 4
    min_vram_gb: 0  # Runs on CPU
    # Synthesis parameters
    default_speed: 1.0
    max_text_length: 5000
